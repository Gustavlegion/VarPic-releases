name: VirusTotal Scan

on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Download assets (for workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          gh release download ${{ steps.tag.outputs.tag }} --repo ${{ github.repository }} --pattern "*.exe" || true
          gh release download ${{ steps.tag.outputs.tag }} --repo ${{ github.repository }} --pattern "*.deb" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Release mode: action scans release assets directly, files = regex filter
      - name: Scan with VirusTotal (release event)
        if: github.event_name == 'release'
        id: vt_release
        continue-on-error: true
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            .*\.(exe|deb)$

      # Manual mode: files downloaded above, files = glob
      - name: Scan with VirusTotal (manual)
        if: github.event_name == 'workflow_dispatch'
        id: vt_manual
        continue-on-error: true
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            *.exe
            *.deb

      - name: Update VirusTotal links in release notes
        if: steps.vt_release.outputs.analysis != '' || steps.vt_manual.outputs.analysis != ''
        run: |
          ANALYSIS="${{ steps.vt_release.outputs.analysis }}${{ steps.vt_manual.outputs.analysis }}"

          # Отримуємо поточний текст notes та прибираємо старі VT рядки
          CURRENT_BODY=$(gh release view ${{ steps.tag.outputs.tag }} \
            --repo ${{ github.repository }} --json body --jq .body)
          CLEAN_BODY=$(echo "$CURRENT_BODY" | grep -v "VirusTotal scan")

          # Action повертає записи через кому: "file1=url1,file2=url2"
          # Розбиваємо на рядки, будуємо VT блок
          VT_LINES=""
          while IFS='=' read -r filename url; do
            [ -z "$filename" ] && continue
            VT_LINES="${VT_LINES}\n🛡️ **VirusTotal scan (${filename}):** ${url}"
          done <<< "$(echo "$ANALYSIS" | tr ',' '\n')"

          NEW_BODY=$(printf '%s\n%b' "$CLEAN_BODY" "$VT_LINES")
          gh release edit ${{ steps.tag.outputs.tag }} \
            --repo ${{ github.repository }} --notes "$NEW_BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
