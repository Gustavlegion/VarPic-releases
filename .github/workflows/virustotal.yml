name: VirusTotal Scan

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Download assets from release
        run: |
          gh release download ${{ steps.tag.outputs.tag }} --repo ${{ github.repository }} --pattern "*.exe" || true
          gh release download ${{ steps.tag.outputs.tag }} --repo ${{ github.repository }} --pattern "*.deb" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan with VirusTotal
        id: vt
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            *.exe
            *.deb

      - name: Append VirusTotal link to release notes
        if: steps.vt.outputs.analysis != ''
        run: |
          VT_URL=$(echo "${{ steps.vt.outputs.analysis }}" | cut -d= -f2-)
          CURRENT_BODY=$(gh release view ${{ steps.tag.outputs.tag }} --repo ${{ github.repository }} --json body --jq .body)
          NEW_BODY=$(printf '%s\n\n\xf0\x9f\x9b\xa1\xef\xb8\x8f **VirusTotal scan:** %s' "$CURRENT_BODY" "$VT_URL")
          gh release edit ${{ steps.tag.outputs.tag }} --repo ${{ github.repository }} --notes "$NEW_BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
