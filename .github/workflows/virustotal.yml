name: VirusTotal Scan

on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Download assets (for workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          gh release download ${{ steps.tag.outputs.tag }} --repo ${{ github.repository }} --pattern "*.exe" || true
          gh release download ${{ steps.tag.outputs.tag }} --repo ${{ github.repository }} --pattern "*.deb" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Scan EXE separately so its output is always captured
      - name: Scan EXE with VirusTotal (release event)
        if: github.event_name == 'release'
        id: vt_exe_release
        continue-on-error: true
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            .*\.exe$

      # Scan DEB separately — 409 here won't affect EXE outputs
      - name: Scan DEB with VirusTotal (release event)
        if: github.event_name == 'release'
        id: vt_deb_release
        continue-on-error: true
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            .*\.deb$

      # Manual mode: scan EXE
      - name: Scan EXE with VirusTotal (manual)
        if: github.event_name == 'workflow_dispatch'
        id: vt_exe_manual
        continue-on-error: true
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            *.exe

      # Manual mode: scan DEB
      - name: Scan DEB with VirusTotal (manual)
        if: github.event_name == 'workflow_dispatch'
        id: vt_deb_manual
        continue-on-error: true
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            *.deb

      - name: Update VirusTotal links in release notes
        if: |
          steps.vt_exe_release.outputs.analysis != '' ||
          steps.vt_deb_release.outputs.analysis != '' ||
          steps.vt_exe_manual.outputs.analysis != '' ||
          steps.vt_deb_manual.outputs.analysis != ''
        run: |
          EXE_REL="${{ steps.vt_exe_release.outputs.analysis }}"
          DEB_REL="${{ steps.vt_deb_release.outputs.analysis }}"
          EXE_MAN="${{ steps.vt_exe_manual.outputs.analysis }}"
          DEB_MAN="${{ steps.vt_deb_manual.outputs.analysis }}"
          ANALYSIS=""
          for part in "$EXE_REL" "$DEB_REL" "$EXE_MAN" "$DEB_MAN"; do
            [ -z "$part" ] && continue
            [ -z "$ANALYSIS" ] && ANALYSIS="$part" || ANALYSIS="$ANALYSIS,$part"
          done

          # Отримуємо поточний текст notes та прибираємо старі VT рядки
          CURRENT_BODY=$(gh release view ${{ steps.tag.outputs.tag }} \
            --repo ${{ github.repository }} --json body --jq .body)
          CLEAN_BODY=$(echo "$CURRENT_BODY" | grep -v "VirusTotal scan")

          # Action повертає записи через кому: "file1=url1,file2=url2"
          # Розбиваємо на рядки, будуємо VT блок
          VT_LINES=""
          while IFS='=' read -r filename url; do
            [ -z "$filename" ] && continue
            VT_LINES="${VT_LINES}\n🛡️ **VirusTotal scan (${filename}):** ${url}"
          done <<< "$(echo "$ANALYSIS" | tr ',' '\n')"

          NEW_BODY=$(printf '%s\n%b' "$CLEAN_BODY" "$VT_LINES")
          gh release edit ${{ steps.tag.outputs.tag }} \
            --repo ${{ github.repository }} --notes "$NEW_BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
